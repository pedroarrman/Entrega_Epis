<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entrega de EPIs</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f8;
    color:#333;
}

header{
    background:#2c3e50;
    color:#fff;
    padding:15px;
}

header h1{
    font-size:24px;
}

nav{
    margin-top:10px;
}

nav a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    margin-right:20px;
}

nav a:hover{
    text-decoration:underline;
}

main{
    max-width:900px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    padding:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input[type=text],
input[type=date]{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

#listaEpis{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
    margin-top:15px;
}

#listaEpis label{
    font-weight:normal;
}

canvas{
    width:100%;
    height:220px;
    border:2px solid #999;
    border-radius:6px;
    background:#fff;
    margin-top:10px;
    touch-action:none;
}

.botones{
    display:flex;
    gap:15px;
    margin-top:25px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#btnLimpiar{
    background:#f39c12;
    color:white;
}

#btnEnviar{
    background:#27ae60;
    color:white;
}

@media(min-width:768px){
#listaEpis{grid-template-columns:1fr 1fr;}
}

</style>

</head>

<body>

<header>
<h1>Entrega de EPIs</h1>

<nav>
<a href="index.html">Nueva entrega</a>
<a href="listado.html">Listado</a>
</nav>

</header>

<main>

<div class="card">

<label>Nombre</label>
<input type="text" id="nombre">

<label>DNI</label>
<input type="text" id="dni">

<label>Fecha de entrega</label>
<input type="date" id="fecha">

<h3 style="margin-top:25px;">EPIs entregados</h3>

<div id="listaEpis">

<label><input type="checkbox" name="epi" value="BATA VERDE"> BATA VERDE</label>
<label><input type="checkbox" name="epi" value="CALZADO SEGURIDAD"> CALZADO SEGURIDAD</label>
<label><input type="checkbox" name="epi" value="CASCOS DE PROTECCION"> CASCOS DE PROTECCION</label>
<label><input type="checkbox" name="epi" value="GORRA PELO"> GORRA PELO</label>
<label><input type="checkbox" name="epi" value="GUANTE CUERO MARCA EN-388"> GUANTE CUERO MARCA EN-388</label>
<label><input type="checkbox" name="epi" value="GUANTE NEOPRENO EN-374"> GUANTE NEOPRENO EN-374</label>
<label><input type="checkbox" name="epi" value="GUANTE NITRIPOR GOMA EN-388"> GUANTE NITRIPOR GOMA EN-388</label>
<label><input type="checkbox" name="epi" value="GUANTE WURTH GOMA EN-388 GRIS"> GUANTE WURTH GOMA EN-388 GRIS</label>
<label><input type="checkbox" name="epi" value="GUANTE WURTH GOMA EN-388 MARRON"> GUANTE WURTH GOMA EN-388 MARRON</label>
<label><input type="checkbox" name="epi" value="MASCARILLA QUIRURGICA"> MASCARILLA QUIRURGICA</label>
<label><input type="checkbox" name="epi" value="MASCARILLA FPP2"> MASCARILLA FPP2</label>
<label><input type="checkbox" name="epi" value="POLAR"> POLAR</label>
<label><input type="checkbox" name="epi" value="TAPONES AUDITIVOS"> TAPONES AUDITIVOS</label>
<label><input type="checkbox" name="epi" value="CHALECO ALTA VISIBILIDAD"> CHALECO ALTA VISIBILIDAD</label>
<label><input type="checkbox" name="epi" value="PANTALÓN DE TRABAJO"> PANTALÓN DE TRABAJO</label>
<label><input type="checkbox" name="epi" value="GUANTES DE NITILO"> GUANTES DE NITILO</label>
<label><input type="checkbox" name="epi" value="BATA LABORATORIO"> BATA LABORATORIO</label>
<label><input type="checkbox" name="epi" value="MANDIL IMPERMEABLE"> MANDIL IMPERMEABLE</label>
<label><input type="checkbox" name="epi" value="CAMISETA GRIS"> CAMISETA GRIS</label>
<label><input type="checkbox" name="epi" value="CAMISETA REFLECTANTE"> CAMISETA REFLECTANTE</label>

</div>

<h3>Firma del trabajador</h3>
<canvas id="canvas"></canvas>

<div class="botones">

<button type="button" id="btnLimpiar" onclick="limpiarFirma()">Limpiar firma</button>
<button type="button" id="btnEnviar" onclick="enviarFormulario()">Enviar</button>

</div>

</div>

</main>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzBk3cCZnlFTZW-vrpI0bmNb0cEYSFyjYek0f4_HllZQo4hk5q3YMhg2VmZ8obJMVWt/exec";

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let dibujando=false;

function ajustar(){
canvas.width=canvas.offsetWidth;
canvas.height=220;
ctx.lineCap="round";
ctx.lineWidth=2;
}
ajustar();

window.addEventListener("resize", ajustar);

canvas.addEventListener("mousedown",()=>dibujando=true);
canvas.addEventListener("mouseup",()=>dibujando=false);
canvas.addEventListener("mouseleave",()=>dibujando=false);
canvas.addEventListener("mousemove",dibujar);

function dibujar(e){
if(!dibujando) return;

ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
}

function limpiarFirma(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();
}

window.onload=()=>{
document.getElementById("fecha").value=
new Date().toISOString().split("T")[0];
};

// ===============================
// ENVIAR FORMULARIO
// ===============================

function enviarFormulario() {

    const nombre = document.getElementById("nombre").value.trim();
    const dni = document.getElementById("dni").value.trim();
    const fecha = document.getElementById("fecha").value;

    const epis = [];

    document
        .querySelectorAll("input[name='epi']:checked")
        .forEach(e => epis.push(e.value));

    if (!nombre) return alert("❌ Falta nombre");
    if (!dni) return alert("❌ Falta DNI");
    if (!fecha) return alert("❌ Falta fecha");
    if (epis.length === 0) return alert("❌ Selecciona al menos un EPI");

    const datos = {
        nombre,
        dni,
        fecha,
        epis,
        firma: canvas.toDataURL("image/png")
    };

    const callback = "cb_" + Date.now();

    window[callback] = function (res) {

        if (res.status === "ok") {

            alert("✔ ENTREGA REGISTRADA CORRECTAMENTE");

            document.getElementById("nombre").value = "";
            document.getElementById("dni").value = "";
            document.getElementById("fecha").value =
                new Date().toISOString().split("T")[0];

            document
                .querySelectorAll("input[name='epi']")
                .forEach(c => c.checked = false);

            limpiarFirma();

        } else {

            alert("❌ " + res.msg);

        }

        delete window[callback];

        if (script.parentNode) {
            script.parentNode.removeChild(script);
        }

    };

    const script = document.createElement("script");

    script.src =
        API_URL +
        "?callback=" + callback +
        "&data=" + encodeURIComponent(JSON.stringify(datos));

let respondio = false;

window[callback] = function(res) {

    respondio = true;

    // ... resto de tu código ...

};

script.onerror = function () {

    if (!respondio) {
        alert("❌ ERROR DE CONEXIÓN CON APPS SCRIPT");
    }

    delete window[callback];

};

    document.body.appendChild(script);

}

</script>

</body>
</html>
